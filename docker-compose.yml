services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: modernfi_rate_agent
      POSTGRES_USER: modernfi
      POSTGRES_PASSWORD: modernfi_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init_db:/docker-entrypoint-initdb.d

  app:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://modernfi:modernfi_dev_password@postgres:5432/modernfi_rate_agent
    ports:
      - "8000:8000"
    depends_on:
      - postgres

volumes:
  postgres_data: