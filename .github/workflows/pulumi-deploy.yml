name: Pulumi Deploy

# Runs automatically on every push to main (i.e. every merge). Uses the
# full-access IAM role, which is only assumable from a workflow run
# targeting the `production` GitHub environment — a PR branch can never
# assume it, regardless of what the workflow file on that branch says.
# The `environment: production` gate below pauses this job for a manual
# approval click if a required reviewer is configured on that environment
# (Settings → Environments → production → Required reviewers). Required
# reviewers needs a public repo, or GitHub Team/Enterprise for a private
# one.

on:
  push:
    branches: [main]

# One deploy against this stack at a time, queued in order rather than
# canceled — an in-progress `pulumi up` shouldn't get killed mid-apply,
# since that can leave infrastructure partially changed. Same group key on
# every run (there's only one stack), so a second merge landing while the
# first is still deploying waits for it instead of running concurrently.
concurrency:
  group: pulumi-deploy-${{ vars.PULUMI_STACK }}

permissions:
  id-token: write # required to mint the OIDC token for AWS
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install infra dependencies
        run: pip install -r infra/requirements.txt

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-west-2

      - name: pulumi up
        uses: pulumi/actions@v7
        with:
          command: up
          stack-name: ${{ vars.PULUMI_STACK }}
          work-dir: infra
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
